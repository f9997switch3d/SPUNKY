<html>
    <head>
        <title>
            Signup
        </title>
    </head>
    <body>
        <form>
            <label for="email">Your email address:</label>
            <input id="email" name="email" type="email" placeholder="dream@dream.com"/>
            <label for="phone number">Your phone number:</label>
            <input id="phone number" name="phone number" type="phone number" placeholder="+1234567890"/>
            <label for="password">choose a secure password</label>
            <input id="password" name="password" type="password" placeholder="*+-psgw3vA"/>
            <input type="submit" value="Signup" class="submit"/>
        </form>
    </body>
</html>
